plugins {
    id 'java'
    id 'org.jetbrains.gradle.plugin.idea-ext' version '1.3'
    id 'com.gradleup.shadow' version '9.3.1'
}

import groovy.json.JsonOutput
import groovy.json.JsonSlurper
import org.gradle.internal.os.OperatingSystem
import java.util.zip.ZipFile

ext {
    if (project.hasProperty('hytale_home')) {
        hytaleHome = file(project.findProperty('hytale_home')).absolutePath
    }
    else {
        def os = OperatingSystem.current()
        if (os.isWindows()) {
            hytaleHome = "${System.getProperty("user.home")}/AppData/Roaming/Hytale"
        }
        else if (os.isMacOsX()) {
            hytaleHome = "${System.getProperty("user.home")}/Library/Application Support/Hytale"
        }
        else if (os.isLinux()) {
            hytaleHome = "${System.getProperty("user.home")}/.var/app/com.hypixel.HytaleLauncher/data/Hytale"
            if (!file(hytaleHome).exists()) {
                hytaleHome = "${System.getProperty("user.home")}/.local/share/Hytale"
            }
        }
    }
}

def installedHytalePackageDir = file("${hytaleHome}/install/${patchline}/package/game/latest")
def repoHytalePackageDir = file("${projectDir}/../bin/server/install/release/package/game/latest")
def hytalePackageDir = installedHytalePackageDir.exists() ? installedHytalePackageDir : (repoHytalePackageDir.exists() ? repoHytalePackageDir : null)
def assetsZipFile = hytalePackageDir != null ? file("${hytalePackageDir}/Assets.zip") : null
def serverJarFile = hytalePackageDir != null ? file("${hytalePackageDir}/Server/HytaleServer.jar") : null
def hasHytaleAssets = assetsZipFile != null && assetsZipFile.exists()
def hasHytaleServerJar = serverJarFile != null && serverJarFile.exists()
def epiccoreBuildRepoDir = file(findProperty('epiccore_build_repo') ?: "${rootDir}/.gradle/repos/epiccore")
def epiccoreExternalRepoDir = file('../hytale-epiccore')

if (!hasHytaleAssets) {
    logger.lifecycle("Hytale assets not detected; asset indexing/validation and run configs will be skipped. Set -Phytale_home=/path/to/Hytale or provide ../bin/server/install/release/package/game/latest/Assets.zip.")
}

java {
    toolchain.languageVersion = JavaLanguageVersion.of(java_version)
    withSourcesJar()
    withJavadocJar()
}

// Quiet warnings about missing Javadocs.
javadoc {
    options.addStringOption('Xdoclint:-missing', '-quiet')
}

// Adds the Hytale server as a build dependency, allowing you to reference and
// compile against their code without bundling it. When a local install is
// present, we still use its jar for launching the server in IDE run configs.
dependencies {
    implementation("${epiccore_maven_group}:epiccore-vampirism:${epiccore_version}")
    compileOnly("javax.annotation:javax.annotation-api:1.3.2")
    testCompileOnly("javax.annotation:javax.annotation-api:1.3.2")
    compileOnly("com.hypixel.hytale:Server:$hytale_build")
    if (hasHytaleServerJar) {
        runtimeOnly(files(serverJarFile))
    }

    testImplementation("com.hypixel.hytale:Server:$hytale_build")
    testImplementation("org.junit.jupiter:junit-jupiter:5.11.4")
    testRuntimeOnly("org.junit.platform:junit-platform-launcher")
}

repositories {
    mavenCentral()
    maven {
        name = 'epiccore-build'
        url = uri(epiccoreBuildRepoDir)
    }
    maven {
        name = "hytale-release"
        url = uri("https://maven.hytale.com/release")
    }
    maven {
        name = "hytale-pre-release"
        url = uri("https://maven.hytale.com/pre-release")
    }
}

tasks.register('publishEpicCoreToBuildRepo', Exec) {
    group = 'publishing'
    description = 'Publishes epiccore-model, epiccore-hytale, epiccore-relic, and epiccore-vampirism from ../hytale-epiccore to the configured local EpicCore build repository.'
    doFirst {
        if (!epiccoreExternalRepoDir.exists()) {
            throw new GradleException("Could not find external EpicCore repository at ${epiccoreExternalRepoDir}.")
        }
    }
    workingDir(epiccoreExternalRepoDir)
    if (OperatingSystem.current().isWindows()) {
        commandLine 'cmd', '/c', 'gradlew.bat', 'publishEpicCoreToBuildRepo', '--no-daemon', '--console=plain',
                "-Pepiccore_publish_repo=${epiccoreBuildRepoDir.absolutePath}"
    } else {
        commandLine './gradlew', 'publishEpicCoreToBuildRepo', '--no-daemon', '--console=plain',
                "-Pepiccore_publish_repo=${epiccoreBuildRepoDir.absolutePath}"
    }
}

// Generates the packaged manifest from the source manifest without mutating
// version-controlled resources.
def generatedPluginManifest = layout.buildDirectory.file('generated/plugin-manifest/manifest.json')
def sourcePluginManifest = file('src/main/resources/manifest.json')

tasks.register('generatePluginManifest') {
    def manifestFile = sourcePluginManifest
    inputs.file(manifestFile)
    inputs.property('version', version)
    inputs.property('hytale_build', hytale_build)
    inputs.property('hytale_server_version', hytale_server_version)
    inputs.property('includes_pack', includes_pack)
    outputs.file(generatedPluginManifest)
    doLast {
        if (!manifestFile.exists()) {
            throw new GradleException("Could not find manifest.json at ${manifestFile.path}!")
        }
        def manifestJson = new JsonSlurper().parseText(manifestFile.text)
        manifestJson.Version = version
        manifestJson.ServerVersion = hytale_server_version
        manifestJson.IncludesAssetPack = includes_pack.toBoolean()
        def outputFile = generatedPluginManifest.get().asFile
        outputFile.parentFile.mkdirs()
        outputFile.text = JsonOutput.prettyPrint(JsonOutput.toJson(manifestJson))
    }
}

def hytaleAssetCategories = [
        effects          : 'Server/Entity/Effects/',
        entityStats      : 'Server/Entity/Stats/',
        soundEvents      : 'Server/Audio/SoundEvents/',
        items            : 'Server/Item/Items/',
        itemAnimations   : 'Server/Item/Animations/',
        itemQualities    : 'Server/Item/Qualities/',
        models           : 'Server/Models/',
        projectiles      : 'Server/Projectiles/',
        projectileConfigs: 'Server/ProjectileConfigs/',
        interactions     : 'Server/Item/Interactions/',
        rootInteractions : 'Server/Item/RootInteractions/'
]
def hytaleAssetIndexFile = layout.buildDirectory.file('generated/hytale-assets/index.json')
def hytaleAssetValidationReportFile = layout.buildDirectory.file('reports/hytale-assets/validation.json')

def trimJsonSuffix = { String value ->
    value.endsWith('.json') ? value.substring(0, value.length() - '.json'.length()) : value
}

def collectAssetEntriesFromZip = { File zipSource ->
    def result = hytaleAssetCategories.collectEntries { category, prefix ->
        [(category): [ids: new TreeSet<String>(), basenames: new TreeSet<String>(), paths: new TreeSet<String>()]]
    }

    ZipFile zipFile = new ZipFile(zipSource)
    try {
        zipFile.entries().each { entry ->
            if (entry.isDirectory() || !entry.name.endsWith('.json')) return
            hytaleAssetCategories.each { category, prefix ->
                if (!entry.name.startsWith(prefix)) return
                def relativePath = entry.name.substring(prefix.length()).replace('\\', '/')
                def assetId = trimJsonSuffix(relativePath)
                result[category].ids << assetId
                result[category].basenames << trimJsonSuffix(relativePath.tokenize('/').last())
                result[category].paths << entry.name
            }
        }
    } finally {
        zipFile.close()
    }

    return result
}

def collectLocalAssetEntries = { File resourcesRoot ->
    def result = hytaleAssetCategories.collectEntries { category, prefix ->
        [(category): [ids: new TreeSet<String>(), basenames: new TreeSet<String>(), paths: new TreeSet<String>()]]
    }

    hytaleAssetCategories.each { category, prefix ->
        def assetDir = new File(resourcesRoot, prefix)
        if (!assetDir.exists()) return

        assetDir.eachFileRecurse { assetFile ->
            if (!assetFile.isFile() || !assetFile.name.endsWith('.json')) return
            def relativePath = assetDir.toPath().relativize(assetFile.toPath()).toString().replace(File.separatorChar, '/' as char)
            def assetId = trimJsonSuffix(relativePath)
            result[category].ids << assetId
            result[category].basenames << trimJsonSuffix(assetFile.name)
            result[category].paths << "${prefix}${relativePath}"
        }
    }

    return result
}

def collectResolvableIds = { Map categoryIndex ->
    def ids = new TreeSet<String>()
    if (categoryIndex == null) return ids
    ids.addAll(categoryIndex.ids ?: [])
    ids.addAll(categoryIndex.basenames ?: [])
    return ids
}

Closure walkJson
walkJson = { Object node, Closure visitor ->
    visitor(node)
    if (node instanceof Map) {
        node.values().each { child -> walkJson.call(child, visitor) }
    } else if (node instanceof List) {
        node.each { child -> walkJson.call(child, visitor) }
    }
}

tasks.register('generateHytaleAssetIndex') {
    if (hasHytaleAssets) {
        inputs.file(assetsZipFile)
    }
    outputs.file(hytaleAssetIndexFile)

    doLast {
        def indexOutput = hytaleAssetIndexFile.get().asFile
        indexOutput.parentFile.mkdirs()

        if (!hasHytaleAssets) {
            def skipped = [
                    generatedAt: new Date().format("yyyy-MM-dd'T'HH:mm:ssXXX"),
                    generatedFrom: null,
                    skipped: true,
                    reason: 'Assets.zip not found',
                    categories: hytaleAssetCategories.collectEntries { category, _ ->
                        [(category): [ids: [], basenames: [], paths: []]]
                    }
            ]
            indexOutput.text = JsonOutput.prettyPrint(JsonOutput.toJson(skipped))
            return
        }

        def collected = collectAssetEntriesFromZip(assetsZipFile)
        def indexPayload = [
                generatedAt: new Date().format("yyyy-MM-dd'T'HH:mm:ssXXX"),
                generatedFrom: assetsZipFile.absolutePath,
                skipped: false,
                categories: collected.collectEntries { category, data ->
                    [(category): [
                            ids      : data.ids as List,
                            basenames: data.basenames as List,
                            paths    : data.paths as List
                    ]]
                }
        ]

        indexOutput.text = JsonOutput.prettyPrint(JsonOutput.toJson(indexPayload))
    }
}

tasks.register('validateHytaleAssetRefs') {
    dependsOn 'generateHytaleAssetIndex'
    outputs.file(hytaleAssetValidationReportFile)

    doLast {
        def reportFile = hytaleAssetValidationReportFile.get().asFile
        reportFile.parentFile.mkdirs()

        if (!hasHytaleAssets) {
            def skipped = [
                    validatedAt: new Date().format("yyyy-MM-dd'T'HH:mm:ssXXX"),
                    skipped: true,
                    reason: 'Assets.zip not found',
                    issues: []
            ]
            reportFile.text = JsonOutput.prettyPrint(JsonOutput.toJson(skipped))
            logger.lifecycle("Skipped Hytale asset validation because no Assets.zip was found.")
            return
        }

        def resourcesRoot = file('src/main/resources')
        def localIndex = collectLocalAssetEntries(resourcesRoot)
        def officialIndex = new JsonSlurper().parse(hytaleAssetIndexFile.get().asFile)
        def effectIds = collectResolvableIds(localIndex.effects)
        effectIds.addAll(collectResolvableIds(officialIndex.categories?.effects))
        def projectileIds = collectResolvableIds(localIndex.projectiles)
        projectileIds.addAll(collectResolvableIds(officialIndex.categories?.projectiles))

        def issues = []
        def splitDataDir = file('src/main/resources/data/vampirism/skills')
        def legacySplitDataDir = file('src/main/resources/Common/UI/Custom/Vampirism/Data/SkillsData')
        if (!splitDataDir.exists() && legacySplitDataDir.exists()) {
            splitDataDir = legacySplitDataDir
        }
        def splitEffectsFile = new File(splitDataDir, 'effects.json')
        def splitActionsFile = new File(splitDataDir, 'actions.json')
        def legacySkillsDataFile = file('src/main/resources/Common/UI/Custom/Vampirism/Data/SkillsData.json')
        def effectDefs = []
        def actionDefs = []
        def effectSource = splitEffectsFile.path
        def actionSource = splitActionsFile.path
        if (splitEffectsFile.exists() || splitActionsFile.exists()) {
            if (splitEffectsFile.exists()) {
                effectDefs = new JsonSlurper().parse(splitEffectsFile)
            }
            if (splitActionsFile.exists()) {
                actionDefs = new JsonSlurper().parse(splitActionsFile)
            }
        } else if (legacySkillsDataFile.exists()) {
            def skillsData = new JsonSlurper().parse(legacySkillsDataFile)
            effectDefs = skillsData.effects ?: []
            actionDefs = skillsData.actions ?: []
            effectSource = legacySkillsDataFile.path
            actionSource = legacySkillsDataFile.path
        }
        effectDefs.each { effectDef ->
                if (!(effectDef.effectId instanceof String) || effectDef.effectId.isBlank()) return
                if (!effectIds.contains(effectDef.effectId)) {
                    issues << [
                            source  : effectSource,
                            category: 'effects',
                            owner   : effectDef.id,
                            field   : 'effectId',
                            value   : effectDef.effectId
                    ]
                }
        }
        actionDefs.each { actionDef ->
                def definition = actionDef.definition
                if (!(definition instanceof Map) || !(definition.projectileId instanceof String) || definition.projectileId.isBlank()) return
                if (!projectileIds.contains(definition.projectileId)) {
                    issues << [
                            source  : actionSource,
                            category: 'projectiles',
                            owner   : actionDef.id,
                            field   : 'projectileId',
                            value   : definition.projectileId
                    ]
                }
        }

        def interactionsDir = file('src/main/resources/Server/Item/Interactions')
        if (interactionsDir.exists()) {
            interactionsDir.eachFileRecurse { interactionFile ->
                if (!interactionFile.isFile() || !interactionFile.name.endsWith('.json')) return
                def payload = new JsonSlurper().parse(interactionFile)
                walkJson(payload) { node ->
                    if (!(node instanceof Map)) return
                    if (node.Type != 'LaunchProjectile' || !(node.ProjectileId instanceof String) || node.ProjectileId.isBlank()) return
                    if (projectileIds.contains(node.ProjectileId)) return
                    issues << [
                            source  : interactionFile.path,
                            category: 'projectiles',
                            owner   : trimJsonSuffix(interactionFile.name),
                            field   : 'ProjectileId',
                            value   : node.ProjectileId
                    ]
                }
            }
        }

        def reportPayload = [
                validatedAt: new Date().format("yyyy-MM-dd'T'HH:mm:ssXXX"),
                skipped: false,
                issues: issues
        ]
        reportFile.text = JsonOutput.prettyPrint(JsonOutput.toJson(reportPayload))

        if (!issues.isEmpty()) {
            def formattedIssues = issues.collect {
                "${it.source} :: ${it.owner} :: ${it.field}='${it.value}' (${it.category})"
            }.join('\n')
            throw new GradleException("Hytale asset reference validation failed:\n${formattedIssues}")
        }
    }
}

// Makes sure the packaged plugin manifest is up to date without changing the
