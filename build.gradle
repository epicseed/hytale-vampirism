// Ensure the shaded jar is produced during a normal build.
tasks.named('build') {
    dependsOn 'shadowJar'
    dependsOn 'validateHytaleAssetRefs'
}

if (hasHytaleAssets && hasHytaleServerJar) {
    // Create the working directory to run the server if it does not already exist.
    def serverRunDir = devServerRunDir.get()
    if (!serverRunDir.exists()) {
        serverRunDir.mkdirs()
    }

    def copyLiveAssetRoot = { File sourceDir, File targetDir, String failureReason ->
        project.copy {
            from(sourceDir)
            into(targetDir)
        }
        logger.warn("Could not create live asset symlink ${targetDir} -> ${sourceDir}; copied assets instead. Asset Editor changes will not reflect directly into src/main/resources. Cause: ${failureReason}")
    }

    def canonicalFile = { File fileObject ->
        try {
            return fileObject.canonicalFile
        } catch (IOException ignored) {
            return fileObject.absoluteFile
        }
    }

    def sameFile = { File left, File right ->
        canonicalFile(left).toPath() == canonicalFile(right).toPath()
    }

    def collectLiveAssetSources = { String rootName ->
        LinkedHashSet<File> roots = new LinkedHashSet<>()
        File localRoot = file("$projectDir/src/main/resources/${rootName}")
        if (localRoot.exists()) {
            roots.add(canonicalFile(localRoot))
        }
        return roots as List
    }

    def mountSingleAssetRoot = { File sourceDir, File targetDir ->
        try {
            java.nio.file.Files.createSymbolicLink(targetDir.toPath(), sourceDir.toPath())
            logger.lifecycle("Mounted live asset root ${targetDir} -> ${sourceDir}")
        } catch (UnsupportedOperationException e) {
            copyLiveAssetRoot(sourceDir, targetDir, e.message ?: e.class.simpleName)
        } catch (SecurityException e) {
            copyLiveAssetRoot(sourceDir, targetDir, e.message ?: e.class.simpleName)
        } catch (java.io.IOException e) {
            copyLiveAssetRoot(sourceDir, targetDir, e.message ?: e.class.simpleName)
        }
    }

    Closure mountLivePath
    Closure linkDirectory
    Closure linkFile

    linkDirectory = { File sourceDir, File targetDir ->
        if (!targetDir.exists()) {
            targetDir.parentFile?.mkdirs()
            java.nio.file.Files.createSymbolicLink(targetDir.toPath(), sourceDir.toPath())
            logger.lifecycle("Mounted live asset root ${targetDir} -> ${sourceDir}")
            return
        }
        if (java.nio.file.Files.isSymbolicLink(targetDir.toPath())) {
            File existingTarget = targetDir.toPath().toRealPath().toFile()
            if (sameFile(existingTarget, sourceDir)) {
                return
            }
            delete(targetDir)
            targetDir.mkdirs()
            existingTarget.listFiles()?.sort { a, b -> a.name <=> b.name }?.each { child ->
                mountLivePath(child, new File(targetDir, child.name))
            }
        } else if (!targetDir.isDirectory()) {
            throw new GradleException("Cannot merge live asset directory ${sourceDir} into file ${targetDir}.")
        }
        sourceDir.listFiles()?.sort { a, b -> a.name <=> b.name }?.each { child ->
            mountLivePath(child, new File(targetDir, child.name))
        }
    }

    linkFile = { File sourceFile, File targetFile ->
        if (!targetFile.exists()) {
            targetFile.parentFile?.mkdirs()
            java.nio.file.Files.createSymbolicLink(targetFile.toPath(), sourceFile.toPath())
            return
        }
        if (java.nio.file.Files.isSymbolicLink(targetFile.toPath())) {
            File existingTarget = targetFile.toPath().toRealPath().toFile()
            if (sameFile(existingTarget, sourceFile)) {
                return
            }
        }
        throw new GradleException("Live asset collision at ${targetFile}. Both ${sourceFile} and another source provide the same path.")
    }

    mountLivePath = { File sourcePath, File targetPath ->
        if (sourcePath.isDirectory()) {
            linkDirectory(sourcePath, targetPath)
        } else if (sourcePath.isFile()) {
            linkFile(sourcePath, targetPath)
        }
    }

    def mountLiveAssetRoot = { String rootName ->
        List<File> sourceRoots = collectLiveAssetSources(rootName)
        if (sourceRoots.isEmpty()) {
            return
        }
        File targetDir = new File(serverRunDir, rootName)
        delete(targetDir)
        if (sourceRoots.size() == 1) {
            mountSingleAssetRoot(sourceRoots.first(), targetDir)
            return
        }
        targetDir.mkdirs()
        try {
            sourceRoots.each { sourceRoot ->
                sourceRoot.listFiles()?.sort { a, b -> a.name <=> b.name }?.each { child ->
                    mountLivePath(child, new File(targetDir, child.name))
                }
            }
            logger.lifecycle("Mounted merged live asset root ${targetDir} from ${sourceRoots*.path}")
        } catch (UnsupportedOperationException e) {
            delete(targetDir)
            sourceRoots.each { sourceRoot ->
                project.copy {
                    from(sourceRoot)
                    into(targetDir)
                }
            }
            logger.warn("Could not create merged live asset symlinks for ${rootName}; copied assets instead. Asset Editor changes will not reflect directly into source repositories. Cause: ${e.message ?: e.class.simpleName}")
        } catch (SecurityException e) {
            delete(targetDir)
            sourceRoots.each { sourceRoot ->
                project.copy {
                    from(sourceRoot)
                    into(targetDir)
                }
            }
            logger.warn("Could not create merged live asset symlinks for ${rootName}; copied assets instead. Asset Editor changes will not reflect directly into source repositories. Cause: ${e.message ?: e.class.simpleName}")
        } catch (java.io.IOException e) {
            delete(targetDir)
            sourceRoots.each { sourceRoot ->
                project.copy {
                    from(sourceRoot)
                    into(targetDir)
                }
            }
            logger.warn("Could not create merged live asset symlinks for ${rootName}; copied assets instead. Asset Editor changes will not reflect directly into source repositories. Cause: ${e.message ?: e.class.simpleName}")
        }
    }

    tasks.named('prepareHytaleServerDebug') {
        doLast {
            liveDevAssetRoots.each { rootName ->
                mountLiveAssetRoot(rootName)
            }
        }
    }

    def createServerJarPath = { String basePath ->
        return serverJarFile.absolutePath
    }

    def createVsCodeClassPaths = { String basePath ->
        def classPaths = [createServerJarPath(basePath)]
        fileTree("$projectDir/libs").matching {
            include '*.jar'
        }.files.sort { a, b -> a.name <=> b.name }.each { jarFile ->
            classPaths << basePath + "/libs/" + jarFile.name
        }
        return classPaths
    }

    def createServerRunArguments = {
        def programParameters = '--allow-op --disable-sentry --assets="' + assetsZipFile.absolutePath + '"'
        def modPaths = []
        if (load_user_mods.toBoolean() && installedHytalePackageDir.exists()) {
            def userModsDir = patchline == 'release'
                    ? file("${hytaleHome}/UserData/Mods")
                    : file("${hytaleHome}/data/${patchline}/UserData/Mods")
            modPaths << userModsDir.absolutePath
        }
        if (!modPaths.isEmpty()) {
            programParameters += ' --mods="' + modPaths.join(',') + '"'
        }
        return programParameters
    }

    // Creates a run configuration in IDEA that will run the Hytale server with
    // your plugin and the default assets.
    idea.project.settings.runConfigurations {
        'HytaleServer'(org.jetbrains.gradle.ext.Application) {
            mainClass = 'com.hypixel.hytale.Main'
            moduleName = project.idea.module.name + '.main'
            programParameters = createServerRunArguments()
            workingDirectory = serverRunDir.absolutePath
        }
    }

    // Creates VS Code debug files with an explicit classpath so the Java
    // debugger doesn't also load this workspace as a classpath plugin.
    tasks.register('generateVSCodeLaunch') {
        def vscodeDir = file("$projectDir/.vscode")
        def launchFile = file("$vscodeDir/launch.json")
        def tasksFile = file("$vscodeDir/tasks.json")
        doLast {
            if (!vscodeDir.exists()) {
                vscodeDir.mkdirs()
            }
            def programParams = createServerRunArguments()
            def launchConfig = [
                    version: "0.2.0",
                    configurations: [
                            [
                                    type: "java",
                                    name: "HytaleServer",
                                    request: "launch",
                                    mainClass: "com.hypixel.hytale.Main",
                                    classPaths: createVsCodeClassPaths("\${workspaceFolder}"),
                                    preLaunchTask: "Prepare HytaleServer Debug",
                                    args: programParams,
                                    cwd: "\${workspaceFolder}/build/dev-run"
                            ]
                    ]
            ]
            def tasksConfig = [
                    version: "2.0.0",
                    tasks  : [
                            [
                                    label         : "Prepare HytaleServer Debug",
                                    type          : "shell",
                                    command       : "./gradlew",
                                    args          : [
                                            "prepareHytaleServerDebug",
                                            "generateVSCodeLaunch",
                                            "--no-daemon",
                                            "--console=plain"
                                    ],
                                    options       : [
                                            cwd: "\${workspaceFolder}"
                                    ],
                                    problemMatcher: [],
                                    group         : "build",
                                    linux         : [
                                            command: "./gradlew"
                                    ],
                                    osx           : [
                                            command: "./gradlew"
                                    ],
                                    windows       : [
                                            command: ".\\\\gradlew.bat"
                                    ]
                            ]
                    ]
            ]
            launchFile.text = JsonOutput.prettyPrint(JsonOutput.toJson(launchConfig))
            tasksFile.text = JsonOutput.prettyPrint(JsonOutput.toJson(tasksConfig))
        }
    }
} else {
    tasks.register('generateVSCodeLaunch') {
        doLast {
            logger.lifecycle("Skipped VSCode launch configuration because no runnable Hytale package was found.")
        }
    }
}
